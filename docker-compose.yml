services:
  salas:
    image: salas:latest
    container_name: salas
    ports:
      - "8000:80"
    depends_on:
      - mariadb
    networks:
      - salas-network
    volumes:
      - ./:/var/www/html
    environment:
      HOME: /tmp
    user: "${UID:-1000}:${GID:-1000}"

  mariadb:
    image: mariadb:11
    container_name: salas_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: salas
      MYSQL_USER: salas
      MYSQL_PASSWORD: salas
      MYSQL_ROOT_PASSWORD: salas
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - salas-network

  selenium:
    image: selenium/standalone-chrome
    container_name: salas_selenium
    ports:
      - "7900:7900" # VNC (pra ver o browser rodando)
    networks:
      - salas-network
    shm_size: 2gb
    
  senhaunica-faker:
    image: uspdev/senhaunica-faker
    container_name: salas_senhaunica-faker
    ports:
      - "3141:3141"
    environment:
          - APP_URL=http://auth.local:3141
    networks:
      salas-network:
        aliases:
          - auth.local

networks:
  salas-network:

volumes:
  mariadb_data: